name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Opt into Node 24 for actions (cache, etc.) - Node 20 deprecated June 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run go fmt check
        run: |
          if [ "$(gofmt -s -l . | grep -v '^generated/' | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l . | grep -v '^generated/'
            exit 1
          fi

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out ./pkg/...

      - name: Run basic tests (without API)
        run: go test -v ./test/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Build binary
        run: go build -v -o spacetraders-mcp .

      - name: Test binary execution
        run: |
          # Test that the binary starts and responds to basic commands
          timeout 5s ./spacetraders-mcp < /dev/null || true
          echo "Binary test completed"

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: spacetraders-mcp-${{ runner.os }}-${{ github.sha }}
          path: spacetraders-mcp
          retention-days: 30

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

  cross-platform:
    name: Cross Platform Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          # Windows on ARM64 is not commonly used yet
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Build cross-platform binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          if [ "$GOOS" = "windows" ]; then
            go build -v -o spacetraders-mcp-${{ matrix.goos }}-${{ matrix.goarch }}.exe .
          else
            go build -v -o spacetraders-mcp-${{ matrix.goos }}-${{ matrix.goarch }} .
          fi

      - name: Upload cross-platform artifacts
        uses: actions/upload-artifact@v5
        with:
          name: spacetraders-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: spacetraders-mcp-*
          retention-days: 30
